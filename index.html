<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score-item">
                <span class="label">Player</span>
                <span class="score" id="playerScore">0</span>
            </div>
            <div class="vs">VS</div>
            <div class="score-item">
                <span class="label">Computer</span>
                <span class="score" id="computerScore">0</span>
            </div>
        </div>
        
        <div class="game-info">
            <p>Controls: <strong>Mouse</strong> or <strong>Arrow Keys (Up/Down)</strong> to move left paddle</p>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="resetBtn">Reset Score</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
